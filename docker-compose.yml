version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: leetcode-trainer-db
    environment:
      POSTGRES_DB: leetcode_trainer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: leetcode-trainer-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/leetcode_trainer
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      APP_SEED_ENABLED: "true"
    ports:
      - "8080:8080"
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: leetcode-trainer-frontend
    depends_on:
      - backend
    ports:
      - "3001:80"
    restart: unless-stopped

volumes:
  postgres_data:
