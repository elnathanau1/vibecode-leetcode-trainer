spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/leetcode_trainer}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.show-sql=false

server.port=8080

app.seed.enabled=${APP_SEED_ENABLED:true}
app.seed.url=https://raw.githubusercontent.com/seanprashad/leetcode-patterns/main/src/data/questions.json

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
